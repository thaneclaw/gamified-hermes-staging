# Fly.io deployment config for the game-show control deck.
#
# One process serves the Vite-built client AND the Socket.IO server on
# the same origin (see server/index.ts). Producer-authored state
# (rundown, roster, overlay layout, card allotments, timer duration)
# persists across restarts on the volume mounted at /data.
#
# Regenerate with `fly launch --copy-config` if you want to move regions
# or change machine size. `fly deploy` picks this file up as-is.

app = "gamified"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# Environment variables available to the running container. Anything
# secret should go via `fly secrets set KEY=VALUE` instead — those land
# in a separate, encrypted store.
[env]
  NODE_ENV = "production"
  SERVE_STATIC = "1"
  DATA_DIR = "/data"
  PORT = "8080"

# Persistent volume for .data/ — rundown + layout JSON live here so
# they outlive container restarts and deploys. Size is plenty for the
# two small JSON files; bump it if we ever add DB-scale state.
[mounts]
  source = "gamified_data"
  destination = "/data"

# One public HTTPS service that also handles WebSocket upgrades for
# /socket.io. Fly.io terminates TLS at its proxy and forwards to the
# internal port. `force_https` kicks any plain-HTTP request up to
# HTTPS, which matters because Socket.IO over polling will refuse to
# mix schemes.
[http_service]
  internal_port = 8080
  force_https = true
  # Keep the machine running 24/7 — live shows can't eat a 2-3s cold
  # start mid-segment. Flip back to "stop" + min_machines_running = 0
  # between tapings if you want to save Fly hours.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  # Lightweight liveness check against /healthz so Fly's proxy knows
  # when the app is ready to take traffic. The server returns "ok\n"
  # unconditionally; a 500 would mark the machine unhealthy.
  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

# Single shared-CPU machine is enough for a handful of concurrent
# clients. Scale with `fly scale memory 512` if the Socket.IO server's
# in-memory state grows (unlikely for our use case).
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
